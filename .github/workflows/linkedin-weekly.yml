name: LinkedIn posts cache — weekly pull

on:
  schedule:
    # Mondays, 10:00 UTC = 6:00 AM EDT (5:00 AM EST when DST is off).
    - cron: "0 10 * * 1"
  workflow_dispatch:
    inputs:
      initial:
        description: "Initial backfill run (fetch reposts for ALL posts)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: linkedin-weekly
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: linkedin-bridge/requirements.txt

      - name: Install dependencies
        run: pip install -r linkedin-bridge/requirements.txt

      - name: Run pipeline
        env:
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_ORG_URN: ${{ secrets.LINKEDIN_ORG_URN }}
        run: |
          if [ "${{ inputs.initial }}" = "true" ]; then
            python linkedin-bridge/pull_linkedin_posts.py --initial
          else
            python linkedin-bridge/pull_linkedin_posts.py
          fi

      - name: Commit updated cache
        run: |
          git config user.name  "tidal-bot"
          git config user.email "tidal-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(linkedin): cache refresh ($(date -u +%Y-%m-%d))"
          git push
